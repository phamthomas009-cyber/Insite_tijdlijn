<!DOCTYPE html>
<html>
<body>

<h1>Actie‑types uit AFAS</h1>
<ul id="list"></ul>

<script>
async function loadData() {
    const response = await fetch("/api/afas");
    const json = await response.json();
    const rows = json.rows;

    let html = "";

    rows.forEach(r => {
        html += `<li>${r.ActionTypeDescription}</li>`;
    });

    document.getElementById("list").innerHTML = html;
}

loadData();
</script>

</body>
</html>
