<!DOCTYPE html>
<html>
<body>

<h1>Status van workflow -170</h1>
<ul id="list"></ul>

<script>
async function loadData() {
    const response = await fetch("/api/afas");
    const json = await response.json();
    const rows = json.rows;

    let html = "";

    rows
        .filter(r => r.TypeId == -170) // alleen workflow -170
        .forEach(r => {
            html += `<li>${r.Status_intern_omschrijving}</li>`;
        });

    document.getElementById("list").innerHTML = html;
}

loadData();
</script>

</body>
</html>
