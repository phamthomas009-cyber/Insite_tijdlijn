<!DOCTYPE html>
<html>
<body>

<h1>Status van workflow</h1>
<ul id="list"></ul>

<script>
async function loadData() {

    const params = new URLSearchParams(window.location.search);

    // SBID kan in AFAS met verschillende hoofdletters voorkomen
    const sbid =
        params.get("sbid") ||
        params.get("SbId") ||
        params.get("SBID") ||
        params.get("Sbid");

    console.log("SBID uit URL:", sbid);

    if (!sbid) {
        document.getElementById("list").innerHTML = "<li>Geen SBID gevonden.</li>";
        return;
    }

    // 2. Data ophalen uit backend
    const response = await fetch("/api/afas");
    const json = await response.json();
    const rows = json.rows || [];

    console.log("Alle rows:", rows);

    // 3. Zoek het dossieritem dat hoort bij deze SBID
    const item = rows.find(r => r.SBID === sbid);

    if (!item) {
        document.getElementById("list").innerHTML = "<li>Geen dossieritem gevonden voor deze SBID.</li>";
        return;
    }

    // 4. Haal het echte workflowId uit het dossieritem
    const workflowId = item.Workflow;

    console.log("Gevonden workflowId:", workflowId);

    // 5. Filter alle stappen van deze workflow
    const filtered = rows.filter(r => r.Workflow === workflowId);

    if (filtered.length === 0) {
        document.getElementById("list").innerHTML = "<li>Geen status gevonden voor deze workflow.</li>";
        return;
    }

    // 6. Status tonen
    let html = "";
    filtered.forEach(r => {
        html += `<li>${r.Status_intern_omschrijving || "(geen status)"}</li>`;
    });

    document.getElementById("list").innerHTML = html;
}

loadData();
</script>

</body>
</html>
